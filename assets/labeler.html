<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>misato — labeler</title>
<style>
:root {
  --bg: #0e0e12;
  --panel: #16161d;
  --panel2: #1d1d27;
  --border: #2a2a36;
  --text: #e4e4ec;
  --muted: #8b8b9b;
  --yes: #3aa55d;
  --no: #c4453d;
  --unsure: #b08a3d;
  --accent: #6a8aff;
  --misato: #8b6bb5;
  --rei: #b8d4e3;
  --asuka: #c44827;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.4 system-ui, -apple-system, sans-serif; }
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
  flex: 0 0 auto;
}
header h1 { font-size: 14px; margin: 0; color: var(--muted); font-weight: 500; }
header .stats { font-size: 12px; color: var(--muted); }
header .stats .num { color: var(--text); font-weight: 600; }

main { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 360px; min-height: 0; }

.image-pane {
  background: #000; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.image-pane .imgwrap {
  position: relative; max-width: 100%; max-height: 100%; display: flex;
  align-items: center; justify-content: center;
}
.image-pane img.page { max-width: 100%; max-height: 100vh; object-fit: contain; display: block; }
.image-pane img.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
}
.image-pane img.overlay.show { opacity: 1; }
.image-pane .meta {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px;
  font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace;
  max-width: calc(100% - 16px);
}
.image-pane .pageidx {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px;
  font-size: 12px;
}

.side {
  background: var(--panel); border-left: 1px solid var(--border);
  padding: 12px; display: flex; flex-direction: column; gap: 12px;
  overflow-y: auto;
}

.charblock {
  background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px;
}
.charblock h2 {
  margin: 0 0 6px 0; font-size: 13px; display: flex; align-items: center; gap: 8px;
}
.charblock h2 .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.charblock .scoreline { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; margin-bottom: 8px; }
.charblock .scoreline .v { color: var(--text); }

.btnrow { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.btn {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  padding: 8px 4px; border-radius: 4px; cursor: pointer; font-size: 13px;
  transition: background 0.1s, border-color 0.1s;
}
.btn .key { font-size: 10px; color: var(--muted); display: block; }
.btn:hover { border-color: #444; }
.btn.active.yes { background: var(--yes); border-color: var(--yes); color: #fff; }
.btn.active.no { background: var(--no); border-color: var(--no); color: #fff; }
.btn.active.unsure { background: var(--unsure); border-color: var(--unsure); color: #fff; }
.btn.active .key { color: rgba(255,255,255,0.7); }

.nav-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
  margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border);
}
.nav-row .btn { padding: 10px 4px; }

.help {
  font-size: 11px; color: var(--muted); padding: 8px;
  background: var(--bg); border-radius: 4px;
}
.help kbd {
  background: var(--panel2); border: 1px solid var(--border);
  padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace;
  color: var(--text); font-size: 10px;
}

.toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar button {
  background: var(--panel2); color: var(--text); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
}
.toolbar button:hover { border-color: #444; }
.toolbar input[type="number"] {
  background: var(--panel2); color: var(--text); border: 1px solid var(--border);
  padding: 4px 6px; border-radius: 4px; width: 70px; font-size: 12px;
}
.toolbar select {
  background: var(--panel2); color: var(--text); border: 1px solid var(--border);
  padding: 4px 6px; border-radius: 4px; font-size: 12px;
}
.progress {
  position: absolute; bottom: 0; left: 0; height: 3px;
  background: var(--accent); transition: width 0.2s;
}
</style>
</head>
<body>
<header>
  <h1>misato &middot; training labeler</h1>
  <div class="toolbar">
    <select id="filter">
      <option value="all">All pages (max certainty)</option>
      <option value="unlabeled">Unlabeled only (any char)</option>
      <option value="labeled">Labeled only</option>
      <option value="focus:misato">Focus: Misato (unlabeled, by Misato certainty)</option>
      <option value="focus:rei">Focus: Rei (unlabeled, by Rei certainty)</option>
      <option value="focus:asuka">Focus: Asuka (unlabeled, by Asuka certainty)</option>
    </select>
    <button id="jumpFirstUnlabeled">Jump to next unlabeled</button>
    <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="overlayToggle"> overlay (<kbd style="font-size:10px">O</kbd>)
    </label>
  </div>
  <div class="stats" id="stats">loading…</div>
</header>
<main>
  <div class="image-pane">
    <div class="imgwrap">
      <img id="img" class="page" alt="">
      <img id="overlayImg" class="overlay" alt="">
    </div>
    <div class="pageidx" id="pageidx"></div>
    <div class="meta" id="meta"></div>
    <div class="progress" id="progress" style="width:0%"></div>
  </div>
  <aside class="side">
    <div id="charblocks"></div>
    <div class="help">
      <strong>Shortcuts</strong><br>
      <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> Yes for char&nbsp;1/2/3<br>
      <kbd>Q</kbd>/<kbd>W</kbd>/<kbd>E</kbd> No for char&nbsp;1/2/3<br>
      <kbd>A</kbd>/<kbd>S</kbd>/<kbd>D</kbd> Unsure for char&nbsp;1/2/3<br>
      <kbd>Space</kbd> next &nbsp; <kbd>B</kbd> back<br>
      <kbd>U</kbd> mark all unsure &nbsp; <kbd>N</kbd> mark all No<br>
      <kbd>X</kbd> clear all on this page
    </div>
    <div class="nav-row">
      <button class="btn" id="prevBtn">← Back</button>
      <button class="btn" id="skipBtn">Skip</button>
      <button class="btn" id="nextBtn">Next →</button>
    </div>
  </aside>
</main>
<script>
const state = {
  queue: null,
  characters: [],
  pages: [],
  index: 0,
  labels: {},
  filter: 'all',
  overlay: false,
};

const COLORS = { misato: 'var(--misato)', rei: 'var(--rei)', asuka: 'var(--asuka)' };

function pageKey(page) { return page.book + '/' + page.filename; }

function visiblePages() {
  if (state.filter === 'all') return state.pages;
  if (state.filter === 'unlabeled') {
    return state.pages.filter(p => {
      const v = state.labels[pageKey(p)] || {};
      return state.characters.some(c => !(c.key in v));
    });
  }
  if (state.filter && state.filter.startsWith('focus:')) {
    const ch = state.filter.split(':')[1];
    // Pages not yet labeled for THIS character, re-sorted by THIS character's
    // certainty descending. Lets you sweep deep into the rankings hunting for
    // Yes labels for one specific character.
    return state.pages
      .filter(p => {
        const v = state.labels[pageKey(p)] || {};
        return !(ch in v);
      })
      .slice()
      .sort((a, b) => (b.scores[ch] || 0) - (a.scores[ch] || 0));
  }
  return state.pages.filter(p => state.labels[pageKey(p)] && Object.keys(state.labels[pageKey(p)]).length > 0);
}

function currentPage() {
  const v = visiblePages();
  if (!v.length) return null;
  if (state.index >= v.length) state.index = v.length - 1;
  if (state.index < 0) state.index = 0;
  return v[state.index];
}

async function loadQueue() {
  const r = await fetch('/api/queue');
  const data = await r.json();
  state.queue = data;
  state.characters = data.characters;
  state.pages = data.pages;
  state.labels = data.labels;
  render();
}

async function loadPageDetail(id) {
  const r = await fetch('/api/page/' + id);
  if (!r.ok) return null;
  return await r.json();
}

async function setLabel(id, character, verdict) {
  const r = await fetch('/api/label', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, character, verdict }),
  });
  if (!r.ok) { console.error('label set failed', r.status); return; }
  const data = await r.json();
  // Update in-memory labels for this page so UI reflects it without refetch.
  const page = state.pages.find(p => p.id === id);
  const k = pageKey(page);
  state.labels[k] = state.labels[k] || {};
  if (verdict === null) delete state.labels[k][character];
  else state.labels[k][character] = verdict;
  if (Object.keys(state.labels[k]).length === 0) delete state.labels[k];
  updateStats(data.counts, data.labeled_pages);
  renderCharblocks();
}

function updateStats(counts, labeled) {
  const total = state.pages.length;
  const parts = state.characters.map(c => {
    const t = counts[c.key] || [0,0,0];
    return `<span class="num">${c.display.split(' ')[0]}</span> ${t[0]}/${t[1]}/${t[2]}`;
  });
  document.getElementById('stats').innerHTML =
    `<span class="num">${labeled}</span>/${total} pages &nbsp;|&nbsp; ` +
    parts.join(' &nbsp;·&nbsp; ') + ' &nbsp;<span style="color:#666">(Y/N/?)</span>';
}

function renderCharblocks() {
  const page = currentPage();
  const container = document.getElementById('charblocks');
  if (!page) {
    container.innerHTML = '<div style="color:var(--muted)">No pages match the filter.</div>';
    return;
  }
  const verdicts = state.labels[pageKey(page)] || {};
  const keymap = [['1','q','a'], ['2','w','s'], ['3','e','d']];
  let html = '';
  state.characters.forEach((c, i) => {
    const score = page.scores[c.key] !== undefined ? page.scores[c.key].toFixed(3) : '—';
    const v = verdicts[c.key];
    const [yk, nk, uk] = keymap[i] || ['','',''];
    html += `
      <div class="charblock">
        <h2><span class="dot" style="background:${COLORS[c.key] || 'var(--accent)'}"></span>${c.display}</h2>
        <div class="scoreline">certainty <span class="v">${score}</span></div>
        <div class="btnrow">
          <button class="btn yes ${v==='yes'?'active':''}" data-char="${c.key}" data-verdict="yes">Yes<span class="key">${yk.toUpperCase()}</span></button>
          <button class="btn no ${v==='no'?'active':''}" data-char="${c.key}" data-verdict="no">No<span class="key">${nk.toUpperCase()}</span></button>
          <button class="btn unsure ${v==='unsure'?'active':''}" data-char="${c.key}" data-verdict="unsure">?<span class="key">${uk.toUpperCase()}</span></button>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
  container.querySelectorAll('button.btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ch = btn.dataset.char;
      const verdict = btn.dataset.verdict;
      const v = state.labels[pageKey(page)] || {};
      // Toggle: if already this verdict, clear; otherwise set.
      if (v[ch] === verdict) setLabel(page.id, ch, null);
      else setLabel(page.id, ch, verdict);
    });
  });
}

function render() {
  const v = visiblePages();
  const page = currentPage();
  if (!page) {
    document.getElementById('img').src = '';
    document.getElementById('pageidx').textContent = '0/0';
    document.getElementById('meta').textContent = '';
    document.getElementById('progress').style.width = '0%';
    renderCharblocks();
    return;
  }
  document.getElementById('img').src = '/image/' + page.id;
  const ov = document.getElementById('overlayImg');
  if (state.overlay) {
    ov.src = '/overlay/' + page.id;
    ov.classList.add('show');
  } else {
    ov.classList.remove('show');
    ov.src = '';
  }
  document.getElementById('pageidx').textContent =
    `${state.index + 1}/${v.length} (rank #${page.id + 1} of ${state.pages.length})`;
  document.getElementById('meta').textContent = page.book + ' · ' + page.filename;
  document.getElementById('progress').style.width = ((state.index + 1) / v.length * 100) + '%';
  renderCharblocks();
  // refresh stats lazily
  fetch('/api/stats').then(r => r.json()).then(d => updateStats(d.counts, d.labeled_pages));
}

function next() { state.index++; render(); }
function prev() { state.index = Math.max(0, state.index - 1); render(); }
function jumpToFirstUnlabeled() {
  const v = visiblePages();
  for (let i = 0; i < v.length; i++) {
    const k = pageKey(v[i]);
    const verdicts = state.labels[k] || {};
    if (state.characters.some(c => !(c.key in verdicts))) {
      state.index = i;
      render();
      return;
    }
  }
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const page = currentPage();
  if (!page) return;
  const yes = ['1','2','3'];
  const no = ['q','w','e'];
  const uns = ['a','s','d'];
  const k = e.key.toLowerCase();

  if (yes.includes(k)) {
    const ch = state.characters[yes.indexOf(k)];
    if (ch) setLabel(page.id, ch.key, 'yes');
  } else if (no.includes(k)) {
    const ch = state.characters[no.indexOf(k)];
    if (ch) setLabel(page.id, ch.key, 'no');
  } else if (uns.includes(k)) {
    const ch = state.characters[uns.indexOf(k)];
    if (ch) setLabel(page.id, ch.key, 'unsure');
  } else if (k === ' ') {
    e.preventDefault(); next();
  } else if (k === 'b') {
    prev();
  } else if (k === 'u') {
    state.characters.forEach(c => setLabel(page.id, c.key, 'unsure'));
  } else if (k === 'n' && !e.ctrlKey && !e.metaKey) {
    state.characters.forEach(c => setLabel(page.id, c.key, 'no'));
  } else if (k === 'x') {
    state.characters.forEach(c => setLabel(page.id, c.key, null));
  } else if (k === 'o') {
    state.overlay = !state.overlay;
    document.getElementById('overlayToggle').checked = state.overlay;
    render();
  }
});

document.getElementById('overlayToggle').addEventListener('change', (e) => {
  state.overlay = e.target.checked;
  render();
});

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('skipBtn').addEventListener('click', next);
document.getElementById('jumpFirstUnlabeled').addEventListener('click', jumpToFirstUnlabeled);
document.getElementById('filter').addEventListener('change', (e) => {
  state.filter = e.target.value;
  state.index = 0;
  render();
});

loadQueue();
</script>
</body>
</html>
